[platformio]
default_envs = esp32-s3-super-mini

[env:esp32-s3-super-mini]
platform = espressif32@6.10.0
board = adafruit_qtpy_esp32s3_n4r2
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
lib_deps =
    https://github.com/rei-vilo/PDLS_EXT3_Basic_Global.git#8.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
    +<*>
    -<server_epaper_test.cpp>
    -<s3_boot_test.cpp>

[env:s3-boot-test]
platform = espressif32@6.10.0
board = adafruit_qtpy_esp32s3_n4r2
framework = arduino
monitor_speed = 115200
upload_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DS3_BOOT_TEST
build_src_filter =
    +<s3_boot_test.cpp>
    -<main.cpp>
    -<server_epaper_test.cpp>
    -<epd_format.cpp>

[env:epaper-server-test]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    https://github.com/rei-vilo/PDLS_EXT3_Basic_Global.git#8.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DEPD_SERVER_TEST
build_src_filter =
    +<server_epaper_test.cpp>
    +<epd_format.cpp>
    -<main.cpp>

[env:native]
platform = native
test_build_src = yes
build_src_filter =
    +<epd_format.cpp>
    -<main.cpp>
