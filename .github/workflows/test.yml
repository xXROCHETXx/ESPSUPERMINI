name: test

on:
  push:
    paths-ignore:
      - "docs/display/**"
  pull_request:
    paths-ignore:
      - "docs/display/**"
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bot/requirements-dev.txt
      - run: pip install -r bot/requirements-dev.txt
      - run: pytest bot/tests

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install platformio==6.1.18
      - run: pio test -e native
      - run: pio run -e esp32-s3-super-mini
